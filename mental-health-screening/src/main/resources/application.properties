

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# URL của Python ML service trên Render
ml.service.url=${ML_SERVICE_URL:http://localhost:5001}
ml.service.enabled=true

# JWT secret (đặt giá trị ngẫu nhiên dài trong Render env)
jwt.secret=${JWT_SECRET:changeme_replace_in_production}
jwt.expiration=86400000

server.port=${PORT:8080}